<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERA - Bank Management</title>
    <link rel="stylesheet" href="web.css">
</head>
<body class="theme-bank">
    <div class="dashboard">
        <div class="sidebar">
            <div class="logo"><h2>💰 PERA</h2><p>Expense Manager</p></div>
            <nav class="menu">
                <a class="menu-item" href="home.html">🏠 Home</a>
                <a class="menu-item" href="financial-summary.html">📊 Financial Summary</a>
                <a class="menu-item" href="expense-recording.html">💸 Expense Recording</a>

        <div class="main">

                <div class="card" style="border: 2px dashed rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; cursor:pointer;">
                    <h3>+ Add Account</h3>
                </div>
